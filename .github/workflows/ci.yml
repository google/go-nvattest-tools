name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    name: Build and Test
    # Pinning to ubuntu-22.04 ensures libxml2 version 2.9.13
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-22.04]
        go-version: ['1.22']

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # --- Linux Setup ---
      - name: Install libxml2 (Ubuntu)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libxml2-dev

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}

      - name: Run Tests
        # CGO_ENABLED=1 is required for libxml2 bindings
        run: |
          export CGO_ENABLED=1
          go test -v -race ./...

  tidy:
    name: Check Tidiness
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: 'stable'
      - name: Verify go.mod and go.sum are tidy
        run: |
          go mod tidy
          git diff --exit-code
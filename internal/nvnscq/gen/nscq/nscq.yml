---
GENERATOR:
  PackageName: nscq
  PackageDescription: "Package NSCQ bindings"
  Includes: ["nscq.h"]
  FlagGroups:
    - {name: "LDFLAGS", traits: ["linux"], flags: ["-Wl,--export-dynamic","-Wl,--unresolved-symbols=ignore-in-object-files"]}
    - {name: "LDFLAGS", traits: ["darwin"], flags: ["-Wl,-undefined,dynamic_lookup"]}
PARSER:
  SourcesPaths: ["nscq.h"]
TRANSLATOR:
  ConstRules:
    defines: eval
    enum: eval
  PtrTips:
    function:
      - {target: "^nscq", default: "sref"}
  MemTips:
    - {target: "^nscq", default: "raw"}
  Rules:
    function:
      - {action: accept, from: "^nscq"}
      - {action: replace, from: "^nscq_session_create$", to: "sessionCreate"}
      - {action: replace, from: "^nscq_session_destroy$", to: "sessionDestroy"}
      - {action: replace, from: "^nscq_session_set_input$", to: "setInput"}
      - {transform: unexport}